services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sums}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Inside the compose network the DB host is the service name "db".
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/sums}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY:-change-me-too-in-production}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-admin@university.edu}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-Admin@12345}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-b2}
      B2_KEY_ID: ${B2_KEY_ID:-}
      B2_APPLICATION_KEY: ${B2_APPLICATION_KEY:-}
      B2_BUCKET_NAME: ${B2_BUCKET_NAME:-}
      B2_ENDPOINT_URL: ${B2_ENDPOINT_URL:-}
      B2_REGION: ${B2_REGION:-us-west-004}
      SEED_ON_START: ${SEED_ON_START:-true}
    ports:
      - "8000:8000"

volumes:
  postgres_data:
